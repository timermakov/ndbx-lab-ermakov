services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      redis:
        condition: service_started
      cassandra:
        condition: service_healthy
      mongo-cluster-init:
        condition: service_completed_successfully
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--port", "${REDIS_PORT}"]
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"

  cassandra:
    image: cassandra:latest
    env_file:
      - .env.local
    environment:
      CASSANDRA_CLUSTER_NAME: "${CASSANDRA_CLUSTER_NAME}"
      CASSANDRA_DC: "${CASSANDRA_DC}"
      CASSANDRA_RACK: "${CASSANDRA_RACK}"
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra
      CASSANDRA_NATIVE_TRANSPORT_PORT: "${CASSANDRA_PORT}"
      MAX_HEAP_SIZE: "${CASSANDRA_MAX_HEAP_SIZE}"
      HEAP_NEWSIZE: "${CASSANDRA_HEAP_NEWSIZE}"
    mem_limit: "${CASSANDRA_MEM_LIMIT}"
    mem_reservation: "${CASSANDRA_MEM_RESERVATION}"
    ports:
      - "${CASSANDRA_PORT}:${CASSANDRA_PORT}"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh 127.0.0.1 ${CASSANDRA_PORT} -e \"DESCRIBE KEYSPACES\""]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 60s

  mongo-cfg1:
    image: mongo:7
    command:
      - mongod
      - --configsvr
      - --replSet
      - "${MONGODB_CONFIG_REPLICA_SET}"
      - --bind_ip_all
      - --port
      - "${MONGODB_CONFIG1_PORT}"
    volumes:
      - mongo_cfg1_data:/data/db
    ports:
      - "${MONGODB_CONFIG1_PORT}:${MONGODB_CONFIG1_PORT}"

  mongo-cfg2:
    image: mongo:7
    command:
      - mongod
      - --configsvr
      - --replSet
      - "${MONGODB_CONFIG_REPLICA_SET}"
      - --bind_ip_all
      - --port
      - "${MONGODB_CONFIG2_PORT}"
    volumes:
      - mongo_cfg2_data:/data/db
    ports:
      - "${MONGODB_CONFIG2_PORT}:${MONGODB_CONFIG2_PORT}"

  mongo-cfg3:
    image: mongo:7
    command:
      - mongod
      - --configsvr
      - --replSet
      - "${MONGODB_CONFIG_REPLICA_SET}"
      - --bind_ip_all
      - --port
      - "${MONGODB_CONFIG3_PORT}"
    volumes:
      - mongo_cfg3_data:/data/db
    ports:
      - "${MONGODB_CONFIG3_PORT}:${MONGODB_CONFIG3_PORT}"

  mongo-shard1-1:
    image: mongo:7
    command:
      - mongod
      - --shardsvr
      - --replSet
      - "${MONGODB_SHARD1_REPLICA_SET}"
      - --bind_ip_all
      - --port
      - "${MONGODB_SHARD1_NODE1_PORT}"
    volumes:
      - mongo_shard1_node1_data:/data/db
    ports:
      - "${MONGODB_SHARD1_NODE1_PORT}:${MONGODB_SHARD1_NODE1_PORT}"

  mongo-shard1-2:
    image: mongo:7
    command:
      - mongod
      - --shardsvr
      - --replSet
      - "${MONGODB_SHARD1_REPLICA_SET}"
      - --bind_ip_all
      - --port
      - "${MONGODB_SHARD1_NODE2_PORT}"
    volumes:
      - mongo_shard1_node2_data:/data/db
    ports:
      - "${MONGODB_SHARD1_NODE2_PORT}:${MONGODB_SHARD1_NODE2_PORT}"

  mongo-shard1-3:
    image: mongo:7
    command:
      - mongod
      - --shardsvr
      - --replSet
      - "${MONGODB_SHARD1_REPLICA_SET}"
      - --bind_ip_all
      - --port
      - "${MONGODB_SHARD1_NODE3_PORT}"
    volumes:
      - mongo_shard1_node3_data:/data/db
    ports:
      - "${MONGODB_SHARD1_NODE3_PORT}:${MONGODB_SHARD1_NODE3_PORT}"

  mongo-shard2-1:
    image: mongo:7
    command:
      - mongod
      - --shardsvr
      - --replSet
      - "${MONGODB_SHARD2_REPLICA_SET}"
      - --bind_ip_all
      - --port
      - "${MONGODB_SHARD2_NODE1_PORT}"
    volumes:
      - mongo_shard2_node1_data:/data/db
    ports:
      - "${MONGODB_SHARD2_NODE1_PORT}:${MONGODB_SHARD2_NODE1_PORT}"

  mongo-shard2-2:
    image: mongo:7
    command:
      - mongod
      - --shardsvr
      - --replSet
      - "${MONGODB_SHARD2_REPLICA_SET}"
      - --bind_ip_all
      - --port
      - "${MONGODB_SHARD2_NODE2_PORT}"
    volumes:
      - mongo_shard2_node2_data:/data/db
    ports:
      - "${MONGODB_SHARD2_NODE2_PORT}:${MONGODB_SHARD2_NODE2_PORT}"

  mongo-shard2-3:
    image: mongo:7
    command:
      - mongod
      - --shardsvr
      - --replSet
      - "${MONGODB_SHARD2_REPLICA_SET}"
      - --bind_ip_all
      - --port
      - "${MONGODB_SHARD2_NODE3_PORT}"
    volumes:
      - mongo_shard2_node3_data:/data/db
    ports:
      - "${MONGODB_SHARD2_NODE3_PORT}:${MONGODB_SHARD2_NODE3_PORT}"

  mongos:
    image: mongo:7
    command:
      - mongos
      - --bind_ip_all
      - --port
      - "${MONGODB_PORT}"
      - --configdb
      - "${MONGODB_CONFIG_REPLICA_SET}/mongo-cfg1:${MONGODB_CONFIG1_PORT},mongo-cfg2:${MONGODB_CONFIG2_PORT},mongo-cfg3:${MONGODB_CONFIG3_PORT}"
    depends_on:
      - mongo-cfg1
      - mongo-cfg2
      - mongo-cfg3
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"

  mongo-cluster-init:
    image: mongo:7
    env_file:
      - .env.local
    depends_on:
      - mongo-cfg1
      - mongo-cfg2
      - mongo-cfg3
      - mongo-shard1-1
      - mongo-shard1-2
      - mongo-shard1-3
      - mongo-shard2-1
      - mongo-shard2-2
      - mongo-shard2-3
      - mongos
    entrypoint:
      - bash
      - -lc
      - "tr -d '\\r' < /scripts/mongo-cluster-init.sh | bash"
    volumes:
      - ./mongo-cluster-init.sh:/scripts/mongo-cluster-init.sh:ro

volumes:
  mongo_cfg1_data:
  mongo_cfg2_data:
  mongo_cfg3_data:
  mongo_shard1_node1_data:
  mongo_shard1_node2_data:
  mongo_shard1_node3_data:
  mongo_shard2_node1_data:
  mongo_shard2_node2_data:
  mongo_shard2_node3_data:
  cassandra_data:
